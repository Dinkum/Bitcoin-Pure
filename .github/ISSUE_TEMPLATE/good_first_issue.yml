name: Good First Issue
description: Suggest a scoped issue suitable for a new contributor.
labels: [good first issue]
body:
  - type: markdown
    attributes:
      value: |
        Use this for well-scoped tasks with a clear success condition and low architectural risk.
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Explain why the task matters.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Possible solution
      description: Describe the likely approach.
    validations:
      required: false
  - type: textarea
    id: useful-skills
    attributes:
      label: Useful skills
      description: List the knowledge a contributor would need before attempting the task.
      value: |
        * Running `go test ./...`
        * Navigating `cmd/bpu-cli` and `internal/*`
        * Basic familiarity with Bitcoin Pure consensus and node behavior
  - type: textarea
    attributes:
      label: Guidance for new contributors
      description: Add any repo-specific pointers that reduce setup and review friction.
      value: |
        Want to work on this issue?

        Include your approach, the tests you plan to add or update, and the parts of the codebase you expect to touch.
