name: Feature Request
description: Suggest a product or protocol improvement for Bitcoin Pure.
labels: [enhancement]
body:
  - type: textarea
    id: feature
    attributes:
      label: Feature request
      description: Describe the change you want and who it helps.
    validations:
      required: true
  - type: textarea
    id: related-problem
    attributes:
      label: Related problem
      description: Explain the operational, UX, or protocol gap behind this request.
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
    validations:
      required: false
