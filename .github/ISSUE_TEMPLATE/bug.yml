name: Bug report
description: Report a defect in Bitcoin Pure.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for reproducible defects in Bitcoin Pure.

        Do not report exploitable security issues in the public issue tracker.
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
        - label: I have searched the existing issues
          required: true
  - type: textarea
    id: current-behaviour
    attributes:
      label: Current behaviour
      description: Tell us what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected behaviour
      description: Tell us what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to reproduce
      description: |
        Tell us how to reproduce the problem.
        Include configuration, commands, RPC payloads, peers, or fixture data where relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Paste any relevant logs, panic output, RPC errors, or screenshots.

        Remove secrets, auth tokens, and private host details before submitting.
    validations:
      required: false
  - type: dropdown
    attributes:
      label: How are you running Bitcoin Pure?
      multiple: false
      options:
        - Compiled from source
        - Installed with ./install
        - Running a packaged build
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: What version are you using?
      description: Include the release version, commit, or branch if known.
      placeholder: e.g. v0.1.6 or main@abcdef1
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system and version
      placeholder: e.g. Ubuntu 24.04 or macOS 15
    validations:
      required: true
  - type: textarea
    id: machine-specs
    attributes:
      label: Machine specifications
      description: |
        Describe the host environment if it matters.
        Example: CPU, RAM, disk type, VM/container, and network conditions.
    validations:
      required: false
